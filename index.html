<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FC 26 Auction — Draft Your Ultimate Squad</title>
    <meta name="description" content="Multiplayer FC 26 player auction draft. Create rooms, bid on 200 real players, build your dream squad with friends." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />
  </head>
  <body style="margin:0;padding:0;background:#050810">
    <div id="root"></div>
    <div id="err" style="color:red; background: black; padding: 20px; font-family: monospace;"></div>
    <script>
      window.addEventListener('error', e => {
        document.getElementById('err').innerText += e.message + '\n' + e.filename + ':' + e.lineno + '\n\n';
      });
      window.addEventListener('unhandledrejection', e => {
        document.getElementById('err').innerText += e.reason + '\n\n';
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
